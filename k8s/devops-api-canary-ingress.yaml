apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-api-canary
  annotations:
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "50"
spec:
  ingressClassName: nginx
  rules:
  - host: devops.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: devops-api-service
            port:
              number: 80